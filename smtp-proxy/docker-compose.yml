services:
  smtp-proxy:
    build: .
    container_name: smtp-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - PORT=3002
    networks:
      - default
      - n8n-network

networks:
  n8n-network:
    external: true
    name: n8n-p5bv_default
