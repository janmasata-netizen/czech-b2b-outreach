services:
  smtp-proxy:
    build: .
    container_name: smtp-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - PORT=3002
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN:?Set PROXY_AUTH_TOKEN in .env}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default
      - n8n-network

networks:
  n8n-network:
    external: true
    name: n8n-p5bv_default
