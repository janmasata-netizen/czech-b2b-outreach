services:
  imap-proxy:
    build: .
    container_name: imap-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - PORT=3001
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default
      - n8n-network

networks:
  n8n-network:
    external: true
    name: n8n-p5bv_default
